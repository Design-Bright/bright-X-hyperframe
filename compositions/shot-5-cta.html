<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <link rel="stylesheet" href="../lib/fonts/figtree.css">
  <script src="../lib/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'Figtree', system-ui, sans-serif;
    }
    #content-wrap { position: absolute; inset: 0; will-change: opacity; }

    /* Layout 2 — heading only */

    #s5-section {
      position: absolute; top: 88px; left: 96px;
      font-size: 15px; font-weight: 300; font-style: italic;
      color: #838A96;
      letter-spacing: 0.18em; text-transform: uppercase;
      opacity: 0; z-index: 12;
    }

    #s5-headline {
      position: absolute; top: 50%; left: 96px;
      transform: translateY(-50%);
      width: 1700px;
      font-size: 144px; font-weight: 700; color: #000;
      letter-spacing: -0.025em; line-height: 1.0;
      z-index: 15;
    }
    .word { display: inline-block; overflow: visible; }
    .word > span {
      display: inline-block;
      opacity: 0;
      transform: translateY(60px);
      will-change: transform, opacity;
    }
    .word + .word { margin-left: 0.18em; }
  </style>
</head>
<body>
  <div id="root"
       data-composition-id="shot-5-cta"
       data-start="0" data-duration="5"
       data-width="1920" data-height="1080">

    <div id="content-wrap">
      <div id="s5-section">AVAILABLE NOW</div>

      <div id="s5-headline">
        <span class="word"><span>Make</span></span>
        <span class="word"><span>better</span></span>
        <span class="word"><span>videos.</span></span>
        <span class="word"><span>Faster.</span></span>
      </div>
    </div>
  </div>

  <script>
    window.__timelines = window.__timelines || {};
    var tl = gsap.timeline({ paused: true });

    tl.fromTo('#s5-section', { opacity: 0 }, { opacity: 1, duration: 0.45, ease: 'power2.out' }, 0);

    var words = document.querySelectorAll('#s5-headline .word > span');
    words.forEach(function(w, i) {
      tl.to(w, { y: 0, opacity: 1, duration: 0.55, ease: 'power3.out' }, 0.2 + i * 0.12);
    });

    // NO exit fade — hard cut to outro.

    window.__timelines['shot-5-cta'] = tl;
  </script>
</body>
</html>
