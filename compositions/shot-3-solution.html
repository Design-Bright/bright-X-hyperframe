<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <link rel="stylesheet" href="../lib/fonts/figtree.css">
  <script src="../lib/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'Figtree', system-ui, sans-serif;
    }
    #content-wrap { position: absolute; inset: 0; will-change: opacity; }

    /* Layout 3 — number alone, big (450px) */

    #s3-section {
      position: absolute; top: 88px; left: 96px;
      font-size: 15px; font-weight: 300; font-style: italic;
      color: #838A96;
      letter-spacing: 0.18em; text-transform: uppercase;
      opacity: 0; z-index: 12;
    }

    #s3-num-wrap {
      position: absolute; top: 220px; left: 96px; width: 1700px;
      z-index: 15;
    }
    #s3-num {
      font-size: 450px; font-weight: 300; color: #17C95F;
      letter-spacing: -0.04em; line-height: 1;
      opacity: 0;
    }
    #s3-num-sub {
      margin-top: 32px;
      font-size: 50px; font-weight: 300; font-style: italic;
      color: #666D7A;
      letter-spacing: -0.005em; line-height: 1.25;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="root"
       data-composition-id="shot-3-solution"
       data-start="0" data-duration="3.5"
       data-width="1920" data-height="1080">

    <div id="content-wrap">
      <div id="s3-section">WITH BROKK</div>

      <div id="s3-num-wrap">
        <div id="s3-num">0s</div>
        <div id="s3-num-sub">from prompt to first cut</div>
      </div>
    </div>
  </div>

  <script>
    window.__timelines = window.__timelines || {};
    var tl = gsap.timeline({ paused: true });

    tl.fromTo('#s3-section', { opacity: 0 }, { opacity: 1, duration: 0.45, ease: 'power2.out' }, 0);

    tl.fromTo('#s3-num', { opacity: 0 }, { opacity: 1, duration: 0.35, ease: 'power2.out' }, 0.2);
    var counter = { val: 0 };
    var numEl = document.getElementById('s3-num');
    tl.to(counter, {
      val: 30,
      duration: 1.2,
      ease: 'power3.out',
      onUpdate: function() { numEl.textContent = Math.floor(counter.val) + 's'; }
    }, 0.4);

    tl.fromTo('#s3-num-sub', { opacity: 0 }, { opacity: 1, duration: 0.5, ease: 'power2.out' }, 1.4);

    // Exit fade-out
    tl.to('#content-wrap', { opacity: 0, duration: 1.0, ease: 'power2.inOut' }, 2.5);

    window.__timelines['shot-3-solution'] = tl;
  </script>
</body>
</html>
