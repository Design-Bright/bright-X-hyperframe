<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="../lib/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden;
      background: #FFFFFF;
    }
  </style>
</head>
<body>
  <div id="root"
       data-composition-id="outro"
       data-start="0" data-duration="2.84"
       data-width="1920" data-height="1080">

    <!-- ═══════════════════════════════════════════════════════════════════════════════
         BRAND OUTRO — Outro.mp4 (1920×1080, h.264, 2.84s).
         Pre-rendered MP4 from the brand assets folder. Plays as the end card.
         ═══════════════════════════════════════════════════════════════════════════════ -->
    <video id="outro-video"
           src="../lib/outros/Outro.mp4"
           data-start="0"
           data-duration="2.84"
           data-track-index="1"
           muted
           playsinline
           preload="auto"
           style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;">
    </video>
  </div>

  <script>
    // Register the timeline. The video element is timeline-driven via data-start/duration;
    // the runtime syncs its currentTime to the composition position automatically.
    window.__timelines = window.__timelines || {};
    window.__timelines['outro'] = gsap.timeline({ paused: true });
  </script>
</body>
</html>
