<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <link rel="stylesheet" href="../lib/fonts/figtree.css">
  <script src="../lib/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'Figtree', system-ui, sans-serif;
    }
    #content-wrap { position: absolute; inset: 0; will-change: opacity; }

    /* Layout 2 — heading + subheading only (no number — moved to its own shot) */

    #s2-section {
      position: absolute; top: 88px; left: 96px;
      font-size: 15px; font-weight: 300; font-style: italic;
      color: #838A96;
      letter-spacing: 0.18em; text-transform: uppercase;
      opacity: 0; z-index: 12;
    }

    #s2-headline {
      position: absolute; top: 360px; left: 96px; width: 1700px;
      font-size: 144px; font-weight: 700; color: #000;
      letter-spacing: -0.025em; line-height: 1.0;
      z-index: 15;
    }
    .word { display: inline-block; overflow: visible; }
    .word > span {
      display: inline-block;
      opacity: 0;
      transform: translateY(60px);
      will-change: transform, opacity;
    }
    .word + .word { margin-left: 0.18em; }

    #s2-sub {
      position: absolute; top: 700px; left: 96px; width: 1700px;
      font-size: 44px; font-weight: 500; color: #383C43;
      letter-spacing: -0.005em; line-height: 1.2;
      z-index: 15;
    }
  </style>
</head>
<body>
  <div id="root"
       data-composition-id="shot-2-problem"
       data-start="0" data-duration="4"
       data-width="1920" data-height="1080">

    <div id="content-wrap">
      <div id="s2-section">THE PROBLEM</div>

      <div id="s2-headline">
        <span class="word"><span>Brand</span></span>
        <span class="word"><span>videos</span></span>
        <span class="word"><span>take</span></span>
        <span class="word"><span>forever.</span></span>
      </div>

      <!-- Sequence uses arrows, not periods -->
      <div id="s2-sub">
        <span class="word"><span>Briefs</span></span>
        <span class="word"><span>→</span></span>
        <span class="word"><span>Drafts</span></span>
        <span class="word"><span>→</span></span>
        <span class="word"><span>Revisions</span></span>
        <span class="word"><span>→</span></span>
        <span class="word"><span>Repeat</span></span>
      </div>
    </div>
  </div>

  <script>
    window.__timelines = window.__timelines || {};
    var tl = gsap.timeline({ paused: true });

    tl.fromTo('#s2-section', { opacity: 0 }, { opacity: 1, duration: 0.45, ease: 'power2.out' }, 0);

    var hWords = document.querySelectorAll('#s2-headline .word > span');
    hWords.forEach(function(w, i) {
      tl.to(w, { y: 0, opacity: 1, duration: 0.55, ease: 'power3.out' }, 0.2 + i * 0.12);
    });

    var sWords = document.querySelectorAll('#s2-sub .word > span');
    sWords.forEach(function(w, i) {
      tl.to(w, { y: 0, opacity: 1, duration: 0.55, ease: 'power3.out' }, 1.2 + i * 0.10);
    });

    tl.to('#content-wrap', { opacity: 0, duration: 1.0, ease: 'power2.inOut' }, 3.0);

    window.__timelines['shot-2-problem'] = tl;
  </script>
</body>
</html>
