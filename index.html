<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <link rel="stylesheet" href="lib/fonts/figtree.css">
  <script src="lib/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1920px; height: 1080px;
      overflow: hidden;
      background: #FFFFFF;
      font-family: 'Figtree', system-ui, sans-serif;
    }

    /* ═══ BRAND-LOCKED LAYER (static — persists across all content shots) ═══ */

    #brand-grid { display: none; }

    /* Dot-wave background — canvas grid of dots with a moving brightness wave */
    #bg-wrap { position: absolute; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
    #bg-dots {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
    }

    #brand-logo {
      position: absolute;
      bottom: 56px; right: 64px;
      width: 194px; height: 40px;
      opacity: 1;
      z-index: 30;
    }
    #brand-logo svg { width: 100%; height: 100%; display: block; }

    .shot-wrap { position: absolute; inset: 0; z-index: 10; will-change: opacity; }
  </style>
</head>
<body>
  <div id="root"
       data-composition-id="main"
       data-start="0"
       data-duration="7.84"
       data-width="1920" data-height="1080"
       data-note="Starter template: 1 example shot + outro. Total 7.84s. Add shots in compositions/ and reference them below.">

    <!-- ═══ BACKGROUND MUSIC ═══
         Pick a track from lib/music/ and update src. Volume defaults to 0.5
         to leave headroom for voiceover. -->
    <audio id="bg-music"
           src="lib/music/summer-hip-hop_main-full.mp3"
           data-start="0"
           data-duration="7.84"
           data-track-index="0"
           data-volume="0.5"
           preload="auto"></audio>

    <!-- ═══ VOICEOVER (optional) ═══
         HyperFrames ships its own Kokoro-based TTS — see
         `npx hyperframes tts --help` and the `hyperframes-media` skill.
         After generating audio, add an <audio> element pointing at the WAV
         file with data-start, data-duration, data-track-index, data-volume,
         and preload="auto". Bump the bg-music + root data-duration if your
         narration is longer than the current shot. -->


    <!-- ═══ BRAND-LOCKED LAYER ═══ -->
    <div id="brand-grid"></div>
    <div id="bg-wrap">
      <canvas id="bg-dots" width="1920" height="1080"></canvas>
    </div>
    <div id="brand-logo">

            <stop offset="0" stop-color="#138241"/>
            <stop offset="1" stop-color="#17c95f"/>
          </linearGradient>
        </defs>

c0-3.3-.7-6.5-1.9-9.4-1.2-2.9-3-5.5-5.2-7.7-2.2-2.2-4.8-4-7.7-5.2-2.9-1.2-6.1-1.9-9.4-1.9s-6.5.7-9.4,1.9c-2.9,1.2-5.5,3-7.7,5.2-2.2,2.2-4,4.8-5.2,7.7-1.2,2.9-1.9,6.1-1.9,9.4s.7,6.5,1.9,9.4c1.2,2.9,3,5.5,5.2,7.7,2.2,2.2,4.8,4,7.7,5.2,2.9,1.2,6.1,1.9,9.4,1.9s6.5-.7,9.4-1.9c2.9-1.2,5.5-3,7.7-5.2,2.2-2.2,4-4.8,5.2-7.7,1.2-2.9,1.9-6.1,1.9-9.4Z"/>

    </div>

    <!-- ═══ CONTENT SHOTS ═══════════════════════════════════════════════
         Each shot is a separate HTML file under compositions/. To add a
         shot, copy compositions/shot-example.html → compositions/your-name.html,
         edit the content, then add a wrapper here with:
           - data-composition-src    path to the file
           - data-composition-id     unique id (must match the `window.__timelines` key)
           - data-start              when it appears on the main timeline (s)
           - data-duration           how long it shows (s)
           - data-track-index        any integer; alternate between adjacent shots
                                     (e.g. 1, 2, 1, 2) so they cross-fade cleanly

         Then bump the root `data-duration` (above) and bg-music/voiceover
         durations to match your new total length. Always end with the outro.
         ═════════════════════════════════════════════════════════════════ -->

    <div id="wrap-shot-1" class="shot-wrap"
         data-composition-src="compositions/shot-example.html"
         data-composition-id="shot-example"
         data-start="0" data-duration="5"
         data-track-index="1"></div>

    <!-- ═══ OUTRO — always on top, hard cut ═══ -->
    <div id="wrap-outro"
         data-composition-src="compositions/outro.html"
         data-composition-id="outro"
         data-start="5" data-duration="2.84"
         data-track-index="3" style="z-index: 100"></div>
  </div>

  <script>
    window.__timelines = window.__timelines || {};
    var tl = gsap.timeline({ paused: true });

    // ═══ DOT-WAVE BACKGROUND — canvas grid of green dots with a moving brightness wave ═══
    //   Halftone-style field. Each dot's opacity + size is modulated by a sine wave
    //   whose center drifts across the frame over time. Deterministic (no Math.random).
    var bgCanvas = document.getElementById('bg-dots');
    var bgCtx = bgCanvas.getContext('2d');
    var DOT_SPACING = 10;       // tighter grid → smaller dots, more of them
    var BG_DOT_COLOR_R = 23, BG_DOT_COLOR_G = 201, BG_DOT_COLOR_B = 95;  // Malachite #17C95F

    function drawDotWave(t) {
      bgCtx.clearRect(0, 0, 1920, 1080);
      // Wave center drifts diagonally over time
      var waveX = 960 + Math.sin(t * 0.45) * 700;
      var waveY = 540 + Math.cos(t * 0.32) * 350;
      // Second wave for richer texture
      var wave2X = 960 + Math.cos(t * 0.28) * 500;
      var wave2Y = 540 + Math.sin(t * 0.55) * 250;

      var cols = Math.ceil(1920 / DOT_SPACING);
      var rows = Math.ceil(1080 / DOT_SPACING);
      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          var x = c * DOT_SPACING + DOT_SPACING / 2;
          var y = r * DOT_SPACING + DOT_SPACING / 2;

          var d1 = Math.hypot(x - waveX, y - waveY);
          var d2 = Math.hypot(x - wave2X, y - wave2Y);
          // Lower frequency = wider bright/dark zones (bigger "blobs")
          var w1 = Math.sin(d1 * 0.006 - t * 1.2);
          var w2 = Math.sin(d2 * 0.005 - t * 0.95);
          var combined = (w1 + w2) / 2;          // -1 .. 1

          var brightness = Math.max(0, combined * 0.5 + 0.35);
          if (brightness < 0.02) continue;
          // Smaller dot radius: max ~2.3px instead of 4.7px
          var radius = 0.5 + brightness * 1.5;
          var alpha = brightness * 0.7;

          bgCtx.fillStyle = 'rgba(' + BG_DOT_COLOR_R + ',' + BG_DOT_COLOR_G + ',' + BG_DOT_COLOR_B + ',' + alpha + ')';
          bgCtx.beginPath();
          bgCtx.arc(x, y, radius, 0, Math.PI * 2);
          bgCtx.fill();
        }
      }
    }

    // Drive the wave deterministically through the composition timeline.
    var dotProxy = { t: 0 };
    // Animate to (outro start). When you extend the timeline, update BOTH `t` and `duration` here.
    tl.to(dotProxy, {
      t: 5, duration: 5, ease: 'none',
      onUpdate: function() { drawDotWave(dotProxy.t); }
    }, 0);

    // ═══ HIDE BRAND LAYER AT OUTRO ═══ (time = outro start)
    tl.set(['#brand-grid', '#bg-wrap', '#brand-logo'], { opacity: 0 }, 5);

    window.__timelines['main'] = tl;
  </script>
</body>
</html>
